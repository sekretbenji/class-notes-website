index.html<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Notes Platform</title>
    <!-- Use Tailwind CSS via CDN for quick styling -->
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Navigation bar -->
    <nav class="bg-blue-600 p-4 text-white flex justify-between items-center">
      <div class="font-bold text-xl">Class Notes</div>
      <div id="nav-links" class="space-x-4 hidden">
        <button class="nav-link hover:underline" data-target="dashboard">Dashboard</button>
        <button class="nav-link hover:underline" data-target="my-notes">My Notes</button>
        <button class="nav-link hover:underline" data-target="library">Class Library</button>
        <button class="nav-link hover:underline" data-target="profile">Profile</button>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded">Logout</button>
      </div>
    </nav>

    <!-- Main content area -->
    <div id="content" class="flex-1 p-4">
      <!-- Authentication (login/signup) section -->
      <div
        id="auth-section"
        class="max-w-md mx-auto bg-white p-6 rounded shadow"
      >
        <h2 id="auth-title" class="text-2xl font-semibold mb-4">Login</h2>
        <!-- Login form -->
        <form id="loginForm" class="space-y-4">
          <input
            id="loginEmail"
            type="email"
            placeholder="Email"
            class="w-full p-2 border rounded"
            required
          />
          <input
            id="loginPassword"
            type="password"
            placeholder="Password"
            class="w-full p-2 border rounded"
            required
          />
          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded"
          >
            Login
          </button>
        </form>
        <!-- Signup form (hidden by default) -->
        <form id="signupForm" class="space-y-4 hidden">
          <input
            id="signupName"
            type="text"
            placeholder="Full Name"
            class="w-full p-2 border rounded"
            required
          />
          <input
            id="signupEmail"
            type="email"
            placeholder="Email"
            class="w-full p-2 border rounded"
            required
          />
          <input
            id="signupPassword"
            type="password"
            placeholder="Password"
            class="w-full p-2 border rounded"
            required
          />
          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded"
          >
            Sign Up
          </button>
        </form>
        <p class="text-sm text-center mt-4">
          <span
            id="toggleAuth"
            class="text-blue-600 cursor-pointer hover:underline"
            >Don't have an account? Sign up</span
          >
        </p>
      </div>

      <!-- Dashboard section -->
      <div id="dashboard" class="hidden">
        <h2 class="text-2xl font-semibold mb-4">
          Welcome, <span id="userName"></span>!
        </h2>
        <p>
          You have
          <span id="notesCount" class="font-bold">0</span>
          notes (&nbsp;<span id="publishedCount" class="font-bold">0</span>
          published).
        </p>
      </div>

      <!-- My Notes section -->
      <div id="my-notes" class="hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-semibold">My Notes</h2>
          <button
            id="newNoteBtn"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
          >
            New Note
          </button>
        </div>
        <div id="notesList" class="space-y-4"></div>
      </div>

      <!-- Note editor (create/edit) -->
      <div
        id="note-editor"
        class="hidden max-w-2xl mx-auto bg-white p-6 rounded shadow"
      >
        <h2 id="editorTitle" class="text-xl font-semibold mb-4">Create Note</h2>
        <form id="noteForm" class="space-y-4">
          <input
            id="noteTitle"
            type="text"
            placeholder="Title"
            class="w-full p-2 border rounded"
            required
          />
          <input
            id="noteSubject"
            type="text"
            placeholder="Subject"
            class="w-full p-2 border rounded"
            required
          />
          <input
            id="noteTopic"
            type="text"
            placeholder="Topic/Tags (comma separated)"
            class="w-full p-2 border rounded"
          />
          <textarea
            id="noteContent"
            placeholder="Content"
            rows="6"
            class="w-full p-2 border rounded"
            required
          ></textarea>
          <select
            id="noteVisibility"
            class="w-full p-2 border rounded"
          >
            <option value="private">Private</option>
            <option value="published">Published</option>
          </select>
          <div class="flex justify-end space-x-2">
            <button
              type="button"
              id="cancelNoteBtn"
              class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
            >
              Save
            </button>
          </div>
        </form>
      </div>

      <!-- Class Library section -->
      <div id="library" class="hidden">
        <h2 class="text-2xl font-semibold mb-4">Class Library</h2>
        <input
          id="searchInput"
          type="text"
          placeholder="Search by title, subject, topic, or author"
          class="w-full p-2 border rounded mb-4"
        />
        <div id="libraryList" class="space-y-4"></div>
      </div>

      <!-- Profile section -->
      <div id="profile" class="hidden">
        <h2 class="text-2xl font-semibold mb-4">My Profile</h2>
        <p><strong>Name:</strong> <span id="profileName"></span></p>
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
      </div>
    </div>
    <footer class="text-center p-4 text-sm text-gray-500">&copy; 2026 Class Notes Platform</footer>
    <!-- App logic -->
    <script src="script.js"></script>
  </body>
</html>
